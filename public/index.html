<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hostname Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main>
    <header>
      <h1>Hostname Generator</h1>
      <p class="subtitle">Generates hostnames in <code>name@adjectivenoun</code> format</p>
    </header>

    <section aria-label="Generated hostnames">
      <ol id="hostname-list"></ol>
    </section>

    <footer>
      <button id="regenerate-btn" type="button">Regenerate</button>
    </footer>
  </main>

  <script src="app.js"></script>
</body>
</html>
